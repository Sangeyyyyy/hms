version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hms_password}
      POSTGRES_DB: ${POSTGRES_DB:-hms_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    networks:
      - hms_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-hms_user} -d ${POSTGRES_DB:-hms_db}']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    container_name: hms_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hms_user}:${POSTGRES_PASSWORD:-hms_password}@postgres:5432/${POSTGRES_DB:-hms_db}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      NODE_ENV: development
      PORT: 3001
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hms_network

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    container_name: hms_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NODE_ENV: development
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    ports:
      - '3000:3000'
    depends_on:
      - api
    networks:
      - hms_network

volumes:
  postgres_data:

networks:
  hms_network:
    driver: bridge
